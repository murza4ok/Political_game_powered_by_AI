[initial_conditions]
description = """
2025 год. Мир на пороге нового биполярного противостояния.
США ввели расширенные санкции против России после эскалации конфликта на Украине и разместили 50 000 военнослужащих в Польше и странах Балтии.
Россия переориентировала экономику на Азию и заключила «Договор о безграничном партнёрстве» с Китаем, однако отношения остаются асимметричными: Пекин ставит собственные экономические интересы выше союзнических обязательств.
Китай балансирует: ВВП на 18% зависит от экспорта в США, но территориальные претензии в Южно-Китайском море требуют негласной поддержки Москвы.
Глобальная напряжённость — 30/100. Идут переговоры о новом договоре по контролю вооружений, однако все три стороны наращивают военные бюджеты.
Ядерный паритет сохраняется, прямой конфликт между ядерными державами невыгоден никому, но прокси-войны и информационное противостояние не прекращаются.
"""

[game]
max_turns = 50
victory_condition = "survival"
history_window = 10
tension_decay_per_turn = 0

[guardrails]
max_tension_threshold = 90
auto_stop_on_nuclear = true

[llm]
provider = "groq"
model = "llama-3.3-70b-versatile"
temperature = 0.7
api_url = "https://api.groq.com/openai/v1/chat/completions"

[tension_deltas]
diplomatic            = -2
economic              = 1
conventional_military = 5
strategic_military    = 10
nuclear               = 50

[escalation_rules]
[escalation_rules.level_0_30]
allowed_tiers = ["Diplomatic", "Economic"]

[escalation_rules.level_31_70]
allowed_tiers = ["Diplomatic", "Economic", "ConventionalMilitary"]

[escalation_rules.level_71_90]
allowed_tiers = ["Diplomatic", "Economic", "ConventionalMilitary", "StrategicMilitary"]

[escalation_rules.level_91_100]
allowed_tiers = ["Diplomatic"]
